name: sgvt-fd
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.8

  # PyTorch and CUDA
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=11.8

  # Scientific computing
  - numpy>=1.24.0
  - scipy>=1.10.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - pillow>=10.0.0

  # Signal processing
  - librosa>=0.10.0
  - soundfile>=0.12.0

  # Utilities
  - tqdm>=4.65.0
  - pyyaml>=6.0

  # Pip dependencies
  - pip
  - pip:
    - transformers>=4.30.0
    - accelerate>=0.20.0
    - peft>=0.4.0
    - tensorboard>=2.13.0
